  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; border: 0; font: inherit; vertical-align: baseline; }
    :root {
      --orange: #D95A00;
      --teal: #00B89A;
      --bg: #060606;
      --border: rgba(255,255,255,0.055);
      --muted: #686868;
      --muted2: #a0a0a0;
    }
    html, body { background: var(--bg); color: #fff; -webkit-font-smoothing: antialiased; height: 100%; overflow-x: hidden; }
    body { font-family: 'Inter', system-ui, sans-serif; line-height: 1; }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; background: none; border: none; font-family: inherit; color: inherit; }

    /* ══════════════ NAV ══════════════ */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: 100px;
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 28px;
      background: transparent;
      transition: background 0.4s;
    }
    .nav.scrolled {
      background: rgba(6,6,6,0.93);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border-bottom: 1px solid var(--border);
    }
    .nav-left { display: flex; align-items: center; gap: 2px; padding-left: max(0px, calc(15vw - 28px)); }
    .nav-center a { display: flex; align-items: center; justify-content: center; }
    .nav-center img {
      height: 116px; width: auto; display: block;
      mix-blend-mode: screen; opacity: 0.92;
    }
    .nav-right { display: flex; align-items: center; gap: 14px; justify-content: flex-end; }
    .nav-link {
      font-size: 15px; font-weight: 600; letter-spacing: 0.02em;
      color: rgba(255,255,255,0.65);
      padding: 5px 10px; border-radius: 4px;
      border: 1px solid transparent;
      transition: color 0.18s, border-color 0.18s, transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
    }
    .nav-link:hover { color: #fff; border-color: rgba(255,255,255,0.42); transform: translateX(3px); }
    .nav-link:focus-visible { outline: 1px solid rgba(255,255,255,0.28); outline-offset: 2px; border-radius: 4px; }
    .nav-link.active { color: #fff; }
    .nav-social {
      color: rgba(255,255,255,0.28); display: flex; align-items: center;
      transition: color 0.18s, transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
    }
    .nav-social:hover { color: rgba(255,255,255,0.88); transform: scale(1.16); }

    /* ══════════════ HERO VIDEO ══════════════ */
    .hero {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    .hero-video {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 177.78vh; /* 16/9 * 100vh */
      height: 56.25vw; /* 9/16 * 100vw */
      min-width: 100%; min-height: 100%;
      pointer-events: none;
      border: none;
    }
    /* Dark overlay so text is readable */
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(6,6,6,0.22) 0%,
        rgba(6,6,6,0.08) 35%,
        rgba(6,6,6,0.08) 60%,
        rgba(6,6,6,0.72) 100%
      );
    }
    /* Center text */
    .hero-text {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      z-index: 2;
    }
    .hero-eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      margin-bottom: 14px;
    }
    .hero-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(64px, 9vw, 130px);
      font-weight: 300; font-style: italic;
      letter-spacing: -0.03em; line-height: 0.92;
      color: #fff;
      text-shadow: 0 2px 40px rgba(0,0,0,0.5);
    }
    .hero-sub {
      font-family: 'Inter', sans-serif;
      font-size: 13px; font-weight: 400;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.55);
      margin-top: 18px;
    }

    /* Scroll indicator */
    .scroll-indicator {
      position: absolute; bottom: 130px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      z-index: 2;
      animation: float 2.2s ease-in-out infinite;
    }
    .scroll-indicator span {
      font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }
    .scroll-line {
      width: 1px; height: 36px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent);
    }
    @keyframes float {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(6px); }
    }

    /* ══════════════ THUMBNAIL STRIP ══════════════ */
    .thumb-strip {
      position: absolute; bottom: 0; left: 0; right: 0;
      z-index: 3;
      padding: 12px 0 16px;
      background: linear-gradient(to top, rgba(6,6,6,0.88) 0%, transparent 100%);
    }
    .thumb-track {
      display: flex; gap: 6px; align-items: center;
      justify-content: center;
      overflow-x: auto; overflow-y: hidden;
      padding: 0 28px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      cursor: grab;
    }
    .thumb-track::-webkit-scrollbar { display: none; }
    .thumb-track:active { cursor: grabbing; }
    .thumb-label {
      font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      flex-shrink: 0; margin-right: 6px;
      white-space: nowrap;
    }
    .thumb-item {
      width: 52px; height: 52px; flex-shrink: 0;
      border-radius: 3px; overflow: hidden;
      opacity: 0.55;
      transition: opacity 0.22s, transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
      cursor: pointer;
    }
    .thumb-item:hover { opacity: 1; transform: scale(1.1) translateY(-3px); }
    .thumb-item img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }

    /* ══════════════ FOOTER ══════════════ */

    .foot-link:hover { color: #fff; }
    .foot-copy { font-size: 12px; color: rgba(255,255,255,0.38); }

  <script>
    /* Nav becomes opaque on scroll */
    var nav = document.getElementById('main-nav');
    window.addEventListener('scroll', function() {
      nav.classList.toggle('scrolled', window.scrollY > 20);
    }, { passive: true });

    /* Drag-to-scroll thumbnail strip */
    var track = document.getElementById('thumb-track');
    var isDown = false, startX, scrollLeft;
    track.addEventListener('mousedown',  function(e) { isDown = true; track.classList.add('active'); startX = e.pageX - track.offsetLeft; scrollLeft = track.scrollLeft; });
    track.addEventListener('mouseleave', function() { isDown = false; });
    track.addEventListener('mouseup',    function() { isDown = false; });
    track.addEventListener('mousemove',  function(e) {
      if (!isDown) return;
      e.preventDefault();
      var x = e.pageX - track.offsetLeft;
      track.scrollLeft = scrollLeft - (x - startX) * 1.4;
    });
  </script>
